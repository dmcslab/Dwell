# .github/workflows/smoke.yml
# ─────────────────────────────────────────────────────────────────────────────
# Dwell — CI Smoke Test
#
# Runs on every push to main and every PR targeting main.
# Boots the full Docker Compose stack, then exercises the complete user journey:
#   health → login → list scenarios → start session → WebSocket connect →
#   set role → submit a choice → confirm valid response → save_exit
#
# Goal: catch first-run failures across OS / environment changes before
# they reach real users.  Target: ≥95% first-run success rate (Phase 0).
# ─────────────────────────────────────────────────────────────────────────────

name: Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Opt into Node.js 24 now to suppress deprecation warnings from
# actions/checkout and actions/setup-python (still ship with Node 20).
# Remove after June 2026 when Node 24 becomes the default runner.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  smoke:
    name: Full stack smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Set up Python (for the test script only) ────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install requests websockets

      # ── 3. Write backend .env ──────────────────────────────────────────────
      #   • SKIP_SEED_UPDATE=false  → seed runs and creates all scenarios
      #   • SECRET_KEY fixed        → deterministic JWT between workers
      - name: Write backend .env for CI
        run: |
          cat > backend/.env << 'EOF'
          DATABASE_URL=postgresql+asyncpg://dwell:dwell@db:5432/dwell
          REDIS_URL=redis://redis:6379/0
          SECRET_KEY=ci-smoke-test-fixed-key-do-not-use-in-prod-aabbcc
          ALLOWED_ORIGINS=*
          SKIP_SEED_UPDATE=false
          EOF

      # ── 4. Write compose override — expose backend port for health check ───
      #   Vite only proxies /api/* so localhost:5173/health returns HTML.
      #   This override exposes port 8000 in CI so the smoke test can reach
      #   the backend's /health endpoint directly. Does not affect prod.
      - name: Write compose override for CI
        run: |
          cat > compose.override.yml << 'EOF'
          services:
            backend:
              ports:
                - "8000:8000"
          EOF

      # ── 5. Build and start the stack ───────────────────────────────────────
      - name: Build images
        run: docker compose build

      - name: Start stack
        run: docker compose up -d

      # ── 6. Wait for services to be ready ───────────────────────────────────
      #   Poll backend /health directly on port 8000 (exposed via override).
      #   Backend needs DB + Redis to start; seed_scenarios.py takes ~10s.
      #   We allow up to 120s total.
      - name: Wait for stack to be healthy
        run: |
          echo "Waiting for http://localhost:8000/health ..."
          for i in $(seq 1 40); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              http://localhost:8000/health 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✓ Backend healthy after $((i * 3))s"
              # Also wait briefly for Vite to finish starting before the test
              sleep 5
              exit 0
            fi
            echo "  attempt $i/40 — got HTTP $STATUS, retrying in 3s..."
            sleep 3
          done
          echo "✗ Backend did not become healthy within 120s"
          docker compose logs --tail=50
          exit 1

      # ── 7. Run the smoke test ──────────────────────────────────────────────
      - name: Run smoke test
        run: python tests/smoke_test.py

      # ── 8. Always dump logs on failure ────────────────────────────────────
      - name: Dump logs on failure
        if: failure()
        run: |
          echo "=== backend ==="
          docker compose logs backend --tail=80
          echo "=== frontend ==="
          docker compose logs frontend --tail=40
          echo "=== db ==="
          docker compose logs db --tail=30

      # ── 9. Tear down ───────────────────────────────────────────────────────
      - name: Tear down
        if: always()
        run: docker compose down -v
