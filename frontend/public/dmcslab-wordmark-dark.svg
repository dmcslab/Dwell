<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 72" fill="none">
  <defs>
    <linearGradient id="tg-dark" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#20c9bc"/>
      <stop offset="100%" stop-color="#14a89e"/>
    </linearGradient>
  </defs>
  
  <!-- ── Icon mark: bracket hex ── -->
  <g transform="translate(0, 8)">
    <!-- Outer hex outline — flat-top hexagon, rotated 90° -->
    <polygon points="14,4 42,4 56,28 42,52 14,52 0,28"
      fill="#161b22" stroke="url(#tg-dark)" stroke-width="1.6" stroke-linejoin="round"/>
    
    <!-- Left bracket arm -->
    <path d="M18 16 L10 28 L18 40" 
      stroke="#20c9bc" stroke-width="2" 
      stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.45"/>
    
    <!-- Right bracket arm -->
    <path d="M38 16 L46 28 L38 40" 
      stroke="#20c9bc" stroke-width="2" 
      stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.45"/>
    
    <!-- d letterform — geometric construction -->
    <!-- Vertical stem -->
    <rect x="22" y="16" width="2.5" height="24" rx="1.25"
      fill="url(#tg-dark)"/>
    <!-- Curved bowl — D shape -->
    <path d="M24.5 16 Q35 16 35 28 Q35 40 24.5 40" 
      fill="none" stroke="url(#tg-dark)" stroke-width="2.5" 
      stroke-linecap="round"/>
  </g>
  
  <!-- ── Wordmark ── -->
  <!-- d — accent, medium weight, slightly raised baseline trick -->
  <text x="68" y="51" 
    font-family="'Liberation Sans','FreeSans',sans-serif" 
    font-weight="400" font-size="38" 
    fill="#20c9bc" letter-spacing="-0.5">d</text>
  
  <!-- MCS — bold, strong -->
  <text x="91" y="51" 
    font-family="'Liberation Sans','FreeSans',sans-serif" 
    font-weight="700" font-size="38" 
    fill="#e6edf3" letter-spacing="-1.5">MCS</text>
  
  <!-- lab — light, smaller, offset down slightly -->
  <text x="200" y="51" 
    font-family="'Liberation Sans','FreeSans',sans-serif" 
    font-weight="300" font-size="30" 
    fill="#5a6e8a" letter-spacing="0.5">lab</text>
  
  <!-- Accent micro-dot between d and M -->
  <circle cx="89" cy="47" r="2.5" fill="#20c9bc" opacity="0.7"/>
  
  <!-- Thin rule under entire wordmark (partial) -->
  <line x1="68" y1="55" x2="265" y2="55" 
    stroke="url(#tg-dark)" stroke-width="1" opacity="0.3"/>
</svg>